# Vendored fork of op-alloy-network 0.20.0. Sole reason this exists: the
# upstream 0.20.0 carries an explicit `impl NetworkWallet<Optimism> for
# EthereumWallet` that conflicts with alloy-network 1.x's blanket
# `impl<N: Network> NetworkWallet<N> for EthereumWallet`. Both impls cover
# the same (trait, type) pair, which Rust's coherence rule rejects with
# E0119. We delete the explicit impl here; the blanket already provides the
# same behavior for any caller that needs it (we currently need none — the
# wallet only does balance reads against the helios-opstack client).
#
# Drop this vendor directory when:
#   1. op-alloy-network ships a release without the explicit impl, AND
#   2. helios-opstack's pinned rev consumes that release.
# At that point delete the [patch.crates-io] entry that points here and
# this whole `vendor/op-alloy-network/` tree.

[package]
name = "op-alloy-network"
version = "0.20.0"
edition = "2024"
rust-version = "1.86"
authors = ["Alloy Contributors"]
description = "Optimism blockchain RPC behavior abstraction (kao-vendored fork)"
homepage = "https://github.com/alloy-rs/op-alloy"
repository = "https://github.com/alloy-rs/op-alloy"
license = "MIT OR Apache-2.0"

[features]
serde = [
    "op-alloy-consensus/serde",
    "op-alloy-rpc-types/serde",
]
std = [
    "op-alloy-consensus/std",
    "op-alloy-rpc-types/std",
]

[lib]
name = "op_alloy_network"
path = "src/lib.rs"

[dependencies]
alloy-consensus = { version = "1.0.26", default-features = false }
alloy-network = { version = "1.0.26", default-features = false }
alloy-primitives = { version = "1.2.0", default-features = false }
alloy-provider = { version = "1.0.26", default-features = false }
alloy-rpc-types-eth = { version = "1.0.26", default-features = false }
op-alloy-consensus = { version = "0.20.0", features = ["alloy-compat"], default-features = false }
op-alloy-rpc-types = { version = "0.20.0", default-features = false }
