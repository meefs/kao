name: release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_PACKAGER_VERSION: "0.11.8"

jobs:
  verify-ci:
    name: verify ci passed
    runs-on: ubuntu-latest
    steps:
      - name: wait for ci.yml to succeed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Waiting for ci.yml to finish for ${{ github.sha }}..."
          for i in $(seq 1 30); do
            result=$(gh run list \
              --commit "${{ github.sha }}" \
              --workflow ci.yml \
              --limit 1 \
              --json status,conclusion \
              --jq '.[0] // empty')
            if [ -z "$result" ]; then
              echo "Attempt $i/30: no ci.yml run found yet, waiting 60s..."
              sleep 60
              continue
            fi
            status=$(echo "$result" | jq -r '.status')
            conclusion=$(echo "$result" | jq -r '.conclusion')
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "CI passed."
                exit 0
              else
                echo "CI finished with conclusion: $conclusion"
                exit 1
              fi
            fi
            echo "Attempt $i/30: CI status=$status, waiting 60s..."
            sleep 60
          done
          echo "Timed out waiting for CI."
          exit 1

  build:
    name: build (${{ matrix.target }})
    needs: verify-ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            packager-formats: appimage,deb,pacman
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            packager-formats: appimage,deb,pacman
          - os: macos-13
            target: x86_64-apple-darwin
            packager-formats: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            packager-formats: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            packager-formats: nsis
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: cache cargo-packager
        id: cache-packager
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-packager
            ~/.cargo/bin/cargo-packager.exe
          key: cargo-packager-${{ env.CARGO_PACKAGER_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: install cargo-packager
        if: steps.cache-packager.outputs.cache-hit != 'true'
        run: cargo install cargo-packager --version ${{ env.CARGO_PACKAGER_VERSION }} --locked

      - name: install NSIS
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y

      - name: install AppImage deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: package
        shell: bash
        run: |
          set -euo pipefail
          cargo packager --release \
            --formats ${{ matrix.packager-formats }} \
            --binaries-dir "target/${{ matrix.target }}/release" \
            --out-dir dist/installers

      - name: rename artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/out
          for f in dist/installers/*; do
            [ -f "$f" ] || continue
            base=$(basename "$f")
            ext="${base##*.}"
            case "$base" in
              *.pkg.tar.gz) mv "$f" "dist/out/kao-${{ github.ref_name }}-${{ matrix.target }}.pkg.tar.gz" ;;
              *.exe)        mv "$f" "dist/out/kao-${{ github.ref_name }}-${{ matrix.target }}-setup.exe" ;;
              *.dmg)        mv "$f" "dist/out/kao-${{ github.ref_name }}-${{ matrix.target }}.dmg" ;;
              *.AppImage)   mv "$f" "dist/out/kao-${{ github.ref_name }}-${{ matrix.target }}.AppImage" ;;
              *.deb)        mv "$f" "dist/out/kao-${{ github.ref_name }}-${{ matrix.target }}.deb" ;;
              *)            mv "$f" "dist/out/${base}" ;;
            esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/out/*
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
      - uses: sigstore/cosign-installer@v3
      - name: sign artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          for f in *.exe *.dmg *.AppImage *.deb *.pkg.tar.gz SHA256SUMS; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem"
          done
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
