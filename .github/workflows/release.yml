name: release

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-ci:
    name: verify ci passed
    runs-on: ubuntu-latest
    steps:
      - name: check ci.yml succeeded for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh run list \
            --commit "${{ github.sha }}" \
            --workflow ci.yml \
            --status success \
            --limit 1 \
            --json conclusion \
            | grep -q '"conclusion":"success"'

  build:
    name: build (${{ matrix.target }})
    needs: verify-ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          name="kao-${{ github.ref_name }}-${{ matrix.target }}"
          tar czf "dist/${name}.tar.gz" -C "target/${{ matrix.target }}/release" kao
      - name: package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $name = "kao-${{ github.ref_name }}-${{ matrix.target }}"
          7z a "dist/$name.zip" "target/${{ matrix.target }}/release/kao.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: draft release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS
      - uses: sigstore/cosign-installer@v3
      - name: sign artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          for f in *.tar.gz *.zip SHA256SUMS; do
            cosign sign-blob --yes "$f" \
              --output-signature "$f.sig" \
              --output-certificate "$f.pem"
          done
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
